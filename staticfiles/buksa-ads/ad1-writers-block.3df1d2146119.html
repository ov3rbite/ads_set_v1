<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buksa — Writer's Block, Solved</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  .frame {
    position: relative;
    height: 100vh;
    aspect-ratio: 9 / 16;
    max-width: 100vw;
    overflow: hidden;
    background: #f4ecd8;
    color: #0a0a0f;
    container-type: inline-size;
    container-name: frame;
    display: flex;
    flex-direction: column;
  }

  /* Masthead */
  .masthead {
    flex-shrink: 0;
    padding: 4cqw 5cqw 2.5cqw;
    border-bottom: 1px solid #0a0a0f;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: clamp(9px, 2.2cqw, 11px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .masthead-left {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-size: clamp(14px, 3.6cqw, 18px);
    font-weight: 900;
    font-style: italic;
    letter-spacing: -0.01em;
    text-transform: none;
  }
  .masthead-right { color: #e85d24; }

  /* Sub-rule */
  .sub-rule {
    flex-shrink: 0;
    padding: 2cqw 5cqw 2.5cqw;
    border-bottom: 3px solid #0a0a0f;
    display: flex; justify-content: space-between; align-items: center;
    font-size: clamp(9px, 2.2cqw, 11px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .saving {
    display: inline-flex; align-items: center; gap: 1.5cqw;
    color: #e85d24;
  }
  .saving-dot {
    width: 1.4cqw; height: 1.4cqw; min-width: 6px; min-height: 6px;
    background: #e85d24; border-radius: 50%;
    animation: savingPulse 1.4s ease-in-out infinite;
  }
  @keyframes savingPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Chapter banner */
  .chapter-banner {
    flex-shrink: 0;
    padding: 4cqw 5cqw;
    opacity: 0;
    transition: opacity 0.6s;
    border-bottom: 1px solid #0a0a0f;
    position: relative;
  }
  .chapter-banner.show { opacity: 1; }
  .chapter-num {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-size: clamp(50px, 14cqw, 86px);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.05em;
    color: #e85d24;
  }
  .chapter-kicker {
    font-size: clamp(9px, 2.2cqw, 11px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 2cqw;
  }
  .chapter-title {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-size: clamp(20px, 5.6cqw, 30px);
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.015em;
    margin-top: 1.2cqw;
  }

  /* Story (flex: 1 — fills remaining space) */
  .story-area {
    flex: 1;
    min-height: 0;
    position: relative;
    padding: 4cqw 5cqw;
    overflow: hidden;
  }
  .story {
    font-family: 'Bodoni 72 Oldstyle', Didot, Georgia, serif;
    font-size: clamp(14px, 3.6cqw, 17px);
    line-height: 1.6;
    color: #0a0a0f;
  }
  .story .drop {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-weight: 900;
    font-size: clamp(44px, 13cqw, 72px);
    float: left;
    line-height: 0.85;
    padding: 0.08em 0.1em 0 0;
    color: #e85d24;
  }
  .story .body-text { display: inline; }
  .typed { color: #0a0a0f; }
  .ghost {
    color: #a8a095;
    font-style: italic;
    transition: color 0.6s ease, font-style 0.6s ease;
  }
  .ghost.accepted { color: #0a0a0f; font-style: normal; }
  .cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: #e85d24;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Editor's Note — sits at bottom of story area */
  .editor-note {
    position: absolute;
    left: 4cqw; right: 4cqw; bottom: 4cqw;
    background: #0a0a0f;
    color: #f4ecd8;
    padding: 3cqw 3.5cqw;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
    box-shadow: 0 8px 20px rgba(10,10,15,0.15);
  }
  .editor-note.show { opacity: 1; transform: translateY(0); }
  .editor-note-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5cqw;
  }
  .editor-note-label {
    font-size: clamp(9px, 2.1cqw, 11px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    color: #e85d24;
  }
  .editor-note-tab {
    border: 1px solid #e85d24;
    padding: 0.6cqw 2cqw;
    font-size: clamp(8px, 1.9cqw, 10px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    color: #e85d24;
  }
  .editor-note-text {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-style: italic;
    font-size: clamp(12px, 3cqw, 15px);
    line-height: 1.35;
  }

  /* Footer */
  .footer {
    flex-shrink: 0;
    padding: 3cqw 5cqw 3.5cqw;
    display: flex; justify-content: space-between; align-items: flex-end;
    border-top: 3px solid #0a0a0f;
    background: #f4ecd8;
  }
  .footer-stat { display: flex; flex-direction: column; }
  .footer-label {
    font-size: clamp(8px, 1.9cqw, 10px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    color: #4a4540;
    margin-bottom: 0.5cqw;
  }
  .footer-val {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-size: clamp(20px, 5.8cqw, 32px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    color: #0a0a0f;
  }
  .footer-stat.accent .footer-val { color: #e85d24; }

  /* End */
  .end-overlay {
    position: absolute; inset: 0;
    background: #0a0a0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6cqw;
    opacity: 0; pointer-events: none;
    transition: opacity 0.9s ease;
    z-index: 20;
  }
  .end-overlay.show { opacity: 1; }
  .end-kicker {
    font-size: clamp(10px, 2.4cqw, 12px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #e85d24;
    font-weight: 700;
    margin-bottom: 4cqw;
  }
  .end-preline {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-style: italic;
    font-size: clamp(18px, 5cqw, 26px);
    color: #f4ecd8;
    margin-bottom: 6cqw;
    text-align: center;
    line-height: 1.2;
    max-width: 90%;
    font-weight: 400;
  }
  .logo-frame {
    padding: 3cqw 6cqw;
    border-top: 2px solid #f4ecd8;
    border-bottom: 2px solid #f4ecd8;
    display: inline-block;
  }
  .logo-text {
    font-family: 'Bodoni 72', Didot, Georgia, serif;
    font-size: clamp(48px, 16cqw, 90px);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #f4ecd8;
    line-height: 1;
  }
  .tagline {
    font-size: clamp(10px, 2.5cqw, 13px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 4cqw;
    color: #e85d24;
    font-weight: 700;
    text-align: center;
  }

</style>
</head>
<body>
<div class="frame">
  <div class="masthead">
    <span class="masthead-left">Buksa</span>
    <span class="masthead-right">Draft № 03 · Autosaved</span>
  </div>

  <div class="sub-rule">
    <span>Chapter One &middot; Page 1</span>
    <span class="saving"><span class="saving-dot"></span>Writing</span>
  </div>

  <div class="chapter-banner" id="chapterBanner">
    <div class="chapter-num">I.</div>
    <div class="chapter-kicker">Chapter One</div>
    <div class="chapter-title">The One Who Stayed</div>
  </div>

  <div class="story-area">
    <div class="story" id="story"></div>

    <div class="editor-note" id="editorNote">
      <div class="editor-note-head">
        <span class="editor-note-label">● AI · Next line</span>
        <span class="editor-note-tab">Tab</span>
      </div>
      <div class="editor-note-text" id="editorNoteText">&ldquo;for something she couldn&rsquo;t name.&rdquo;</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-stat">
      <div class="footer-label">Chapter</div>
      <div class="footer-val">01</div>
    </div>
    <div class="footer-stat accent" style="text-align: center;">
      <div class="footer-label">Word Count</div>
      <div class="footer-val" id="wordCount">0</div>
    </div>
    <div class="footer-stat" style="text-align: right;">
      <div class="footer-label">Streak</div>
      <div class="footer-val">12d</div>
    </div>
  </div>

  <div class="end-overlay" id="end">
    <div class="end-kicker">The Buksa Promise</div>
    <div class="end-preline">The hardest part of writing<br>isn&rsquo;t the idea.</div>
    <div class="logo-frame"><div class="logo-text">BUKSA</div></div>
    <div class="tagline">The book in you, unlocked</div>
  </div>
</div>


<script>
let timers = [];
function wait(ms) { return new Promise(r => timers.push(setTimeout(r, ms))); }

function animateWords(to, duration = 900) {
  return new Promise(resolve => {
    const el = document.getElementById('wordCount');
    const from = parseInt(el.textContent.replace(/,/g, ''), 10) || 0;
    const start = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      const v = Math.round(from + (to - from) * eased);
      el.textContent = v.toLocaleString();
      if (p < 1) requestAnimationFrame(tick); else resolve();
    }
    requestAnimationFrame(tick);
  });
}

const startPrefix = 'he waited by the window ';
const ghostLine1 = 'for something she couldn\u2019t name.';
const userLine2 = ' The kettle whistled. She didn\u2019t move. ';
const ghostLine2 = 'She had learned the sound of her own loneliness.';
const userLine3 = ' Outside, the rain started ';
const ghostLine3 = 'like it had been waiting too.';

const ghostSuggestions = [
  '&ldquo;for something she couldn&rsquo;t name.&rdquo;',
  '&ldquo;She had learned the sound of her own loneliness.&rdquo;',
  '&ldquo;like it had been waiting too.&rdquo;'
];

async function typeBeforeCursor(container, cursor, text, speed = 55, isGhost = false) {
  const span = document.createElement('span');
  span.className = isGhost ? 'ghost' : 'typed';
  container.insertBefore(span, cursor);
  for (let i = 0; i <= text.length; i++) {
    span.textContent = text.slice(0, i);
    await wait(speed + Math.random() * 30);
  }
  return span;
}

async function play() {
  timers.forEach(clearTimeout);
  timers = [];
  document.getElementById('chapterBanner').classList.remove('show');
  document.getElementById('editorNote').classList.remove('show');
  document.getElementById('end').classList.remove('show');
  document.getElementById('wordCount').textContent = '0';

  const story = document.getElementById('story');
  story.innerHTML = '<span class="drop">S</span><span class="body-text" id="bodyText"></span>';
  const body = document.getElementById('bodyText');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  body.appendChild(cursor);

  await wait(500);
  document.getElementById('chapterBanner').classList.add('show');
  await wait(1200);

  const noteTextEl = document.getElementById('editorNoteText');

  await typeBeforeCursor(body, cursor, startPrefix, 55);
  animateWords(12);
  await wait(500);

  noteTextEl.innerHTML = ghostSuggestions[0];
  document.getElementById('editorNote').classList.add('show');
  const g1 = await typeBeforeCursor(body, cursor, ghostLine1, 40, true);
  await wait(700);
  document.getElementById('editorNote').classList.remove('show');
  g1.classList.add('accepted');
  animateWords(28);
  await wait(500);

  await typeBeforeCursor(body, cursor, userLine2, 55);
  animateWords(46);
  await wait(400);

  noteTextEl.innerHTML = ghostSuggestions[1];
  document.getElementById('editorNote').classList.add('show');
  const g2 = await typeBeforeCursor(body, cursor, ghostLine2, 38, true);
  await wait(700);
  document.getElementById('editorNote').classList.remove('show');
  g2.classList.add('accepted');
  animateWords(62);
  await wait(500);

  await typeBeforeCursor(body, cursor, userLine3, 55);
  animateWords(78);
  await wait(400);

  noteTextEl.innerHTML = ghostSuggestions[2];
  document.getElementById('editorNote').classList.add('show');
  const g3 = await typeBeforeCursor(body, cursor, ghostLine3, 38, true);
  await wait(700);
  document.getElementById('editorNote').classList.remove('show');
  g3.classList.add('accepted');
  animateWords(92);

  await wait(1400);
  document.getElementById('end').classList.add('show');
}

function toggleFull() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') play();
  if (e.key === 'f' || e.key === 'F') toggleFull();
  if (e.key === 'Escape') location.href = 'index.html';
  if (e.key === 'h' || e.key === 'H') document.body.classList.toggle('hide-ui');
});

play();
</script>
</body>
</html>
