<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taskmatic — It Reads Your Designs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  .frame {
    position: relative; height: 100vh; aspect-ratio: 9 / 16; max-width: 100vw; overflow: hidden;
    background:
      radial-gradient(ellipse 70% 40% at 80% 10%, rgba(74,127,184,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 100%, rgba(230,156,60,0.06) 0%, transparent 60%),
      #0a0c13;
    color: #f4f6fa;
    container-type: inline-size; container-name: frame;
    display: flex; flex-direction: column;
  }

  .top { flex-shrink: 0; padding: 4cqw 5cqw 2cqw; display: flex; justify-content: space-between; align-items: center; }
  .brand-inline { display: flex; align-items: center; }
  .ad-num { font-size: clamp(10px, 2.4cqw, 12px); letter-spacing: 0.2em; color: #5a6373; font-weight: 700; }

  .hero { flex-shrink: 0; padding: 2cqw 5cqw 3cqw; }
  .kicker {
    font-size: clamp(10px, 2.4cqw, 13px); letter-spacing: 0.25em; text-transform: uppercase;
    font-weight: 700; color: #4a7fb8; margin-bottom: 3cqw;
    display: flex; align-items: center; gap: 2cqw;
  }
  .kicker::before { content: ''; display: block; width: 4cqw; height: 1.5px; background: #4a7fb8; }
  .hero-headline {
    font-size: clamp(28px, 8.8cqw, 52px);
    font-weight: 800; letter-spacing: -0.035em; line-height: 0.96;
    color: #fff; margin-bottom: 1.8cqw;
  }
  .hero-headline .accent { color: #4a7fb8; }
  .hero-sub {
    font-size: clamp(13px, 3.5cqw, 17px); color: #8b94a5; line-height: 1.4; font-weight: 400; max-width: 95%;
  }

  /* Slack window */
  .slack-window {
    flex: 1; min-height: 0; margin: 0 4cqw;
    background: #1a1d29;
    border: 1px solid rgba(232,234,240,0.08);
    border-radius: 10px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .slack-header {
    flex-shrink: 0; padding: 2.5cqw 3cqw;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(232,234,240,0.06);
    background: rgba(0,0,0,0.12);
  }
  .slack-header-left { display: flex; align-items: center; gap: 2cqw; }
  .slack-mark { width: 6cqw; height: 6cqw; min-width: 22px; min-height: 22px; border-radius: 5px; object-fit: cover; }
  .slack-app-title { font-size: clamp(11px, 2.9cqw, 14px); font-weight: 700; }
  .slack-chat-tabs {
    display: flex; gap: 3cqw; font-size: clamp(10px, 2.5cqw, 12px); font-weight: 600;
    color: rgba(232,234,240,0.4);
  }
  .slack-chat-tabs .tab-active { color: #fff; border-bottom: 2px solid #8a5cf6; padding-bottom: 0.4cqw; }

  .chat {
    flex: 1; min-height: 0; padding: 3cqw;
    display: flex; flex-direction: column; gap: 2.5cqw; overflow: hidden;
    justify-content: flex-start;
  }

  .msg {
    display: grid; grid-template-columns: auto 1fr; gap: 2.5cqw;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .msg.show { opacity: 1; transform: translateY(0); }

  .msg-avatar {
    width: 9cqw; height: 9cqw; min-width: 34px; min-height: 34px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .msg-avatar.taskmatic { background: #0d1824; font-weight: 900; letter-spacing: -0.05em; font-size: clamp(11px, 2.8cqw, 14px); }
  .msg-avatar.user { background: linear-gradient(135deg, #7a5a3a, #a67848); font-size: clamp(12px, 3cqw, 15px); }

  .msg-body { min-width: 0; }
  .msg-head { display: flex; align-items: baseline; gap: 1.5cqw; margin-bottom: 1cqw; flex-wrap: wrap; }
  .msg-name { font-size: clamp(12px, 3.2cqw, 14px); font-weight: 700; color: #fff; }
  .msg-badge {
    padding: 0.3cqw 1.2cqw; background: rgba(255,255,255,0.08);
    border-radius: 3px; font-size: clamp(8px, 2cqw, 10px); font-weight: 700;
    color: rgba(232,234,240,0.7); letter-spacing: 0.05em;
  }
  .msg-time { font-size: clamp(10px, 2.4cqw, 12px); color: rgba(232,234,240,0.5); }
  .msg-text { font-size: clamp(12px, 3.2cqw, 15px); line-height: 1.45; color: #e8eaf0; font-weight: 400; }
  .msg-text strong { font-weight: 700; color: #fff; }
  .msg-text em { color: #e69c3c; font-style: normal; font-weight: 600; }

  /* Attachment */
  .attachment {
    margin-top: 1.5cqw;
    padding: 2cqw;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,234,240,0.1);
    border-radius: 5px;
    position: relative;
    overflow: hidden;
  }
  .att-name {
    font-size: clamp(10px, 2.5cqw, 12px);
    color: rgba(232,234,240,0.65);
    margin-bottom: 1.2cqw;
    font-weight: 600;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .att-mockup {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5cqw;
  }
  .att-phone {
    background: linear-gradient(180deg, #1a1030 0%, #0a0518 100%);
    aspect-ratio: 3 / 5;
    border-radius: 3px;
    padding: 1.2cqw 0.8cqw;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .att-phone-time {
    padding: 0.6cqw 1.2cqw;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    font-size: clamp(6px, 1.5cqw, 8px);
    color: #fbbf24;
    font-weight: 900;
    margin-top: 2cqw;
    text-align: center;
    line-height: 1.1;
  }
  .att-phone-body {
    flex: 1;
    background: linear-gradient(180deg, #3a2a60 0%, #4a1e4a 60%, #6a2e3a 100%);
    width: 100%;
    margin-top: 1cqw;
    border-radius: 2px;
    position: relative;
  }
  .att-phone.final .att-phone-body { background: linear-gradient(180deg, #1a1030 0%, #2a1050 100%); }
  .game-over-text {
    position: absolute; top: 30%; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(6px, 1.6cqw, 8px);
    font-weight: 900; color: #fde68a;
    text-align: center; line-height: 1;
  }
  .scan-line {
    position: absolute; left: 0; right: 0; top: 0;
    height: 6cqw;
    background: linear-gradient(180deg, transparent, rgba(74,127,184,0.9), transparent);
    opacity: 0; pointer-events: none;
  }
  .attachment.scanning .scan-line {
    opacity: 1;
    animation: scanMove 1.6s ease-in-out;
  }
  @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

  /* Analyze state pill */
  .analyze-pill {
    display: inline-flex; align-items: center; gap: 1.5cqw;
    margin-top: 1.5cqw;
    padding: 1cqw 2cqw;
    background: rgba(74,127,184,0.15);
    border: 1px solid rgba(74,127,184,0.35);
    border-radius: 999px;
    font-size: clamp(10px, 2.5cqw, 12px);
    color: #4a7fb8;
    font-weight: 700;
  }
  .analyze-pill::before {
    content: ''; width: 1.6cqw; height: 1.6cqw; min-width: 7px; min-height: 7px;
    background: #4a7fb8; border-radius: 50%;
    animation: pulseDot 1s infinite;
  }
  @keyframes pulseDot { 50% { opacity: 0.3; } }

  /* Task card */
  .tm-task {
    margin-top: 1.8cqw;
    border: 1px solid rgba(232,234,240,0.14);
    border-radius: 6px;
    padding: 2.2cqw 2.8cqw;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2cqw;
    align-items: flex-start;
    transition: border-color 0.5s, box-shadow 0.5s;
  }
  .tm-task.updated {
    border-color: rgba(74,127,184,0.6);
    box-shadow: 0 0 0 2px rgba(74,127,184,0.15);
  }
  .tm-task-title {
    font-size: clamp(12px, 3.2cqw, 15px);
    font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 1.8cqw;
  }
  .tm-task-tag {
    display: inline-block; margin-left: 1cqw;
    padding: 0.3cqw 1.2cqw;
    background: rgba(230,156,60,0.18); color: #e69c3c;
    border-radius: 3px;
    font-size: clamp(10px, 2.5cqw, 12px); font-weight: 700;
    font-family: 'SF Mono', Menlo, monospace;
    vertical-align: middle;
  }
  .tm-task-meta {
    display: flex; align-items: center; gap: 1.5cqw;
    font-size: clamp(11px, 2.9cqw, 13px);
    color: rgba(232,234,240,0.85); font-weight: 500;
  }
  .tm-status {
    width: 4.5cqw; height: 4.5cqw; min-width: 16px; min-height: 16px;
    background: #4a7fb8; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900;
    font-size: clamp(10px, 2.5cqw, 12px);
    flex-shrink: 0; line-height: 1;
  }
  .tm-task-meta .assignee { color: #e69c3c; font-weight: 600; }
  .tm-view-btn {
    padding: 1.2cqw 2.5cqw; border: 1px solid rgba(232,234,240,0.3); border-radius: 5px;
    font-size: clamp(10px, 2.5cqw, 12px); font-weight: 700; color: #fff; flex-shrink: 0;
  }

  .brand-foot {
    flex-shrink: 0;
    padding: 3cqw 5cqw 8cqw;
    display: flex; align-items: center; gap: 3cqw;
  }
  .brand-foot-mark { width: 10cqw; height: 10cqw; min-width: 38px; min-height: 38px; border-radius: 10px; object-fit: cover; }
  .brand-foot-text { display: flex; flex-direction: column; }
  .brand-foot-name { font-size: clamp(15px, 4cqw, 19px); font-weight: 800; letter-spacing: -0.02em; line-height: 1; color: #fff; }
  .brand-foot-tag { font-size: clamp(10px, 2.4cqw, 12px); color: #8b94a5; font-weight: 500; margin-top: 0.8cqw; }

  .end-overlay {
    position: absolute; inset: 0; background: #0a0c13;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8cqw; z-index: 30; text-align: center;
  }
  .end-overlay.show { display: flex; }
  .end-logo { height: 11cqw; min-height: 40px; margin-bottom: 3cqw; }
  .end-tagline {
    font-size: clamp(14px, 3.6cqw, 18px); color: #8b94a5;
    font-weight: 500; line-height: 1.4; max-width: 80%;
  }
  .end-tagline em { color: #4a7fb8; font-style: normal; font-weight: 700; }


  .beat { opacity: 0; }
  .beat.show { opacity: 1; }

</style>
</head>
<body>
<div class="frame">
  <div class="top">
    <div class="brand-inline">
      <img src="taskmatic-wordmark-white.svg" alt="Taskmatic" style="height:3.5cqw;min-height:14px;">
    </div>
    <div class="ad-num">02 / 14</div>
  </div>

  <div class="hero">
    <div class="kicker">Vision AI</div>
    <div class="hero-headline">It reads your<br><span class="accent">designs.</span></div>
    <div class="hero-sub">Drop a PNG. Taskmatic writes the task.</div>
  </div>

  <div class="slack-window">
    <div class="slack-header">
      <div class="slack-header-left">
        <img src="logo.png" class="slack-mark">
        <span class="slack-app-title">Taskmatic</span>
      </div>
      <div class="slack-chat-tabs">
        <span class="tab-active">Chat</span>
        <span>History</span>
        <span>About</span>
      </div>
    </div>
    <div class="chat" id="chat"></div>
  </div>

  <div class="brand-foot">
    <img src="logo.png" class="brand-foot-mark">
    <div class="brand-foot-text">
      <div class="brand-foot-name">Taskmatic</div>
      <div class="brand-foot-tag">Reads every pixel.</div>
    </div>
  </div>

  <div class="end-overlay" id="end">
    <img src="taskmatic-wordmark-white.svg" alt="Taskmatic" class="end-logo">
    <div class="end-tagline">
      <div class="beat" id="beat1">Paste your Figma.</div>
      <div class="beat" id="beat2"><em>Get your tasks.</em></div>
    </div>
  </div>
</div>


<script>
let timers = [];
function wait(ms) { return new Promise(r => timers.push(setTimeout(r, ms))); }

function userAttachMsg() {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="msg-avatar user"><img src="mark.png" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;"></div>
    <div class="msg-body">
      <div class="msg-head"><span class="msg-name">Mark</span><span class="msg-time">Just now</span></div>
      <div class="msg-text">open a task for matching the game over screen to this design</div>
      <div class="attachment" id="attachment">
        <div class="scan-line"></div>
        <div class="att-name">📎 ux_design.png</div>
        <div class="att-mockup">
          <div class="att-phone"><div class="att-phone-time">0:09<br>96 m</div><div class="att-phone-body"></div></div>
          <div class="att-phone"><div class="att-phone-time">0:01<br>123 m</div><div class="att-phone-body"></div></div>
          <div class="att-phone final"><div class="att-phone-body"><div class="game-over-text">GAME<br>OVER</div></div></div>
        </div>
      </div>
    </div>
  `;
  return el;
}

function taskmaticAnalyzing() {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="msg-avatar taskmatic"><img src="logo.png" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;"></div>
    <div class="msg-body">
      <div class="msg-head"><span class="msg-name">Taskmatic</span><span class="msg-badge">APP</span><span class="msg-time">Just now</span></div>
      <div class="analyze-pill">Analyzing attachment</div>
    </div>
  `;
  return el;
}

function taskmaticResult() {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="msg-avatar taskmatic"><img src="logo.png" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;"></div>
    <div class="msg-body">
      <div class="msg-head"><span class="msg-name">Taskmatic</span><span class="msg-badge">APP</span><span class="msg-time">Just now</span></div>
      <div class="msg-text">Analyzed. The design shows <em>Splash</em> &mdash; a space-themed game. Built task #109 with full spec from the image.</div>
      <div class="tm-task updated">
        <div>
          <div class="tm-task-title">Implement game-over screen to match Splash spec<span class="tm-task-tag">Task #109</span></div>
          <div class="tm-task-meta">
            <span class="tm-status">✲</span>
            <span>Not Started · P2 · <span class="assignee">@Mark</span></span>
          </div>
        </div>
        <span class="tm-view-btn">View</span>
      </div>
    </div>
  `;
  return el;
}

async function play() {
  timers.forEach(clearTimeout);
  timers = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  document.getElementById('end').classList.remove('show');
  document.querySelectorAll('.beat').forEach(b => b.classList.remove('show'));

  await wait(800);
  const user = userAttachMsg();
  chat.appendChild(user);
  requestAnimationFrame(() => user.classList.add('show'));
  await wait(1500);

  // Trigger scanning on the attachment
  const attachment = document.getElementById('attachment');
  attachment.classList.add('scanning');

  const analyzing = taskmaticAnalyzing();
  chat.appendChild(analyzing);
  requestAnimationFrame(() => analyzing.classList.add('show'));
  await wait(2000);

  // Replace analyzing with result, remove user message to make room
  analyzing.remove();
  attachment.classList.remove('scanning');
  user.remove();
  const result = taskmaticResult();
  chat.appendChild(result);
  requestAnimationFrame(() => result.classList.add('show'));

  await wait(5200);
  document.getElementById('end').classList.add('show');
  await wait(1200);
  document.getElementById('beat1').classList.add('show');
  await wait(600);
  document.getElementById('beat2').classList.add('show');
}



play();
</script>
</body>
</html>
