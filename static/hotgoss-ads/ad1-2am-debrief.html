<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotgoss — you up?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  .frame {
    position: relative;
    height: 100vh;
    aspect-ratio: 9 / 16;
    max-width: 100vw;
    overflow: hidden;
    background: #fdfaf3;
    color: #14110e;
    container-type: inline-size;
    container-name: frame;
    display: flex;
    flex-direction: column;
  }

  .status {
    flex-shrink: 0;
    padding: 3.5cqw 6cqw 2cqw;
    display: flex; justify-content: space-between; align-items: center;
    font-size: clamp(12px, 3cqw, 15px);
    font-weight: 700;
    color: #14110e;
  }

  /* Header card — party-invite style */
  .header-card {
    flex-shrink: 0;
    margin: 1cqw 5cqw 3cqw;
    padding: 4.5cqw 5cqw;
    background: #fff;
    border: 1.5px solid #14110e;
    border-radius: 5cqw;
    position: relative;
  }
  .chip {
    position: absolute;
    top: -2.5cqw; left: 5cqw;
    padding: 1.2cqw 3cqw;
    background: #ff5f52;
    color: #fff;
    border: 1.5px solid #14110e;
    border-radius: 999px;
    font-size: clamp(10px, 2.4cqw, 12px);
    font-weight: 800;
    letter-spacing: 0.05em;
    transform: rotate(-2deg);
  }
  .brand-row {
    display: flex; align-items: center; gap: 3cqw;
    margin-bottom: 2.5cqw;
  }
  .brand-dot {
    width: 10cqw; height: 10cqw; min-width: 36px; min-height: 36px;
    background: #ff5f52;
    border-radius: 50%;
    border: 1.5px solid #14110e;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    font-size: clamp(15px, 4cqw, 18px);
    color: #fff;
    letter-spacing: -0.02em;
  }
  .brand-name {
    font-size: clamp(17px, 4.5cqw, 22px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-sub {
    font-size: clamp(11px, 2.8cqw, 13px);
    color: rgba(20,17,14,0.55);
    margin-top: 2px;
    font-weight: 500;
  }
  .brand-sub .online { color: #2d7a3e; font-weight: 700; }

  .context-line {
    font-size: clamp(13px, 3.4cqw, 16px);
    line-height: 1.4;
    color: rgba(20,17,14,0.7);
    font-weight: 500;
  }
  .context-line .time {
    font-weight: 800;
    color: #14110e;
  }

  /* Messages */
  .messages {
    flex: 1;
    min-height: 0;
    padding: 2cqw 5cqw 3cqw;
    display: flex; flex-direction: column;
    gap: 2.5cqw;
    overflow: hidden;
    justify-content: flex-end;
  }

  .bubble {
    max-width: 82%;
    padding: 3.5cqw 4cqw;
    border-radius: 5cqw;
    font-size: clamp(13px, 3.6cqw, 17px);
    line-height: 1.35;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px) scale(0.98);
    transition: opacity 0.35s, transform 0.35s;
  }
  .bubble.show { opacity: 1; transform: translateY(0) scale(1); }

  .bubble.me {
    align-self: flex-end;
    background: #14110e;
    color: #fdfaf3;
    border-bottom-right-radius: 1.5cqw;
  }
  .bubble.goss {
    align-self: flex-start;
    background: #ff5f52;
    color: #fff;
    border: 1.5px solid #14110e;
    border-bottom-left-radius: 1.5cqw;
    font-weight: 700;
  }
  .bubble.goss.loud { font-weight: 800; }
  .bubble em { font-style: italic; }

  /* Typing dots */
  .typing {
    align-self: flex-start;
    padding: 3.5cqw 4cqw;
    background: #ff5f52;
    color: #fff;
    border: 1.5px solid #14110e;
    border-radius: 5cqw;
    border-bottom-left-radius: 1.5cqw;
    display: flex; gap: 1.5cqw; align-items: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .typing.show { opacity: 1; transform: translateY(0); }
  .typing span {
    width: 2cqw; height: 2cqw; min-width: 8px; min-height: 8px;
    background: #fff;
    border-radius: 50%;
    animation: typeDot 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typeDot {
    0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* Input */
  .input-bar {
    flex-shrink: 0;
    padding: 3cqw 5cqw 4cqw;
    display: flex; align-items: center; gap: 2.5cqw;
    border-top: 1px solid rgba(20,17,14,0.12);
  }
  .input-field {
    flex: 1;
    background: #fff;
    border: 1.5px solid #14110e;
    border-radius: 999px;
    padding: 2.5cqw 4cqw;
    font-size: clamp(12px, 3cqw, 14px);
    color: rgba(20,17,14,0.5);
    font-weight: 500;
  }
  .send-btn {
    width: 11cqw; height: 11cqw; min-width: 40px; min-height: 40px;
    border-radius: 50%;
    background: #ff5f52;
    border: 1.5px solid #14110e;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn::before {
    content: '↑';
    font-size: clamp(18px, 5cqw, 24px);
    font-weight: 900;
    color: #fff;
  }

  /* End */
  .end-overlay {
    position: absolute; inset: 0;
    background: #14110e;
    color: #fdfaf3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6cqw;
    opacity: 0; pointer-events: none;
    transition: opacity 0.9s ease;
    z-index: 30;
    text-align: center;
  }
  .end-overlay.show { opacity: 1; }
  .end-chip {
    display: inline-block;
    padding: 1.5cqw 4cqw;
    background: #ff5f52;
    color: #fff;
    border: 1.5px solid #fdfaf3;
    border-radius: 999px;
    font-size: clamp(10px, 2.5cqw, 13px);
    font-weight: 800;
    letter-spacing: 0.05em;
    margin-bottom: 5cqw;
    transform: rotate(-2deg);
  }
  .end-preline {
    font-size: clamp(28px, 9cqw, 54px);
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 0.95;
    margin-bottom: 6cqw;
  }
  .end-preline em {
    font-style: normal;
    background: #ff5f52;
    color: #fdfaf3;
    padding: 0 0.25em;
    border-radius: 0.12em;
    display: inline-block;
  }
  .logo-word {
    font-size: clamp(48px, 16cqw, 90px);
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 0.9;
    margin-bottom: 3cqw;
  }
  .logo-word .dot {
    display: inline-block;
    width: 0.16em; height: 0.16em;
    background: #ff5f52;
    border-radius: 50%;
    vertical-align: 0.08em;
    margin-left: -0.04em;
  }
  .tagline {
    font-size: clamp(13px, 3.4cqw, 17px);
    color: rgba(253,250,243,0.7);
    font-weight: 500;
    line-height: 1.35;
  }

</style>
</head>
<body>
<div class="frame">
  <div class="status">
    <span>2:47</span>
    <span>●●●●●</span>
  </div>

  <div class="header-card">
    <span class="chip">● open · 2:47am</span>
    <div class="brand-row">
      <div class="brand-dot">hg</div>
      <div>
        <div class="brand-name">hotgoss</div>
        <div class="brand-sub"><span class="online">● online</span> · always</div>
      </div>
    </div>
    <div class="context-line">
      <span class="time">friday, 2:47am</span> &middot; just home from the thing
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <div class="input-field">tell me everything...</div>
    <div class="send-btn"></div>
  </div>

  <div class="end-overlay" id="end">
    <span class="end-chip">● open always</span>
    <div class="end-preline">some convos<br>only happen <em>after midnight.</em></div>
    <div class="logo-word">hotgoss<span class="dot"></span></div>
    <div class="tagline">your friend in chaos mode.</div>
  </div>
</div>


<script>
let timers = [];
function wait(ms) { return new Promise(r => timers.push(setTimeout(r, ms))); }

const thread = [
  { from: 'me', text: 'i have so much to tell u' },
  { from: 'goss', text: 'wait start at the beginning. what was she wearing', typing: 800, dwell: 1400 },
  { from: 'me', text: 'the silver dress. AGAIN.' },
  { from: 'goss', text: 'the same one from christmas?? 😭', typing: 700, loud: true, dwell: 1400 },
  { from: 'me', text: 'yes and then HE showed up' },
  { from: 'goss', text: 'which he', typing: 700, dwell: 900 },
  { from: 'me', text: 'the one from october' },
  { from: 'goss', text: 'okay i\u2019m sitting down. <em>everything.</em> dont skip a thing', typing: 900, dwell: 1800 }
];

async function addMessage(m) {
  const container = document.getElementById('messages');

  if (m.typing && m.from === 'goss') {
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    await wait(m.typing);
    t.remove();
  }

  const b = document.createElement('div');
  b.className = 'bubble ' + m.from + (m.loud ? ' loud' : '');
  b.innerHTML = m.text;
  container.appendChild(b);
  requestAnimationFrame(() => b.classList.add('show'));

  while (container.children.length > 5) container.firstChild.remove();
  await wait(m.dwell || 900);
}

async function play() {
  timers.forEach(clearTimeout);
  timers = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('end').classList.remove('show');

  await wait(700);
  for (const m of thread) await addMessage(m);
  await wait(1400);
  document.getElementById('end').classList.add('show');
}



play();
</script>
</body>
</html>
