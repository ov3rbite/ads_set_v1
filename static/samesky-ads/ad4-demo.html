<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SameSky — Product Demo (9:16)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #000; }
  body { display: flex; align-items: center; justify-content: center; }

  /* 9:16 frame acts as the phone itself — no bezels, full bleed */
  .frame {
    position: relative;
    height: 100vh;
    aspect-ratio: 9 / 16;
    max-width: 100vw;
    overflow: hidden;
    background: linear-gradient(180deg, #0f0f1f 0%, #0a0a14 100%);
    color: #fff;
    container-type: inline-size;
    container-name: frame;
  }

  /* Ambient background stars */
  .ambient { position: absolute; inset: 0; pointer-events: none; }
  .ambient .dot { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: 0.2; }

  /* Status bar */
  .status {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 3.5cqw 6cqw 2cqw;
    display: flex; justify-content: space-between; align-items: center;
    font-size: clamp(12px, 3cqw, 15px); font-weight: 600;
    z-index: 5;
  }

  .step-label {
    position: absolute;
    top: 11cqw; left: 50%; transform: translateX(-50%);
    font-size: clamp(9px, 2.2cqw, 11px); color: #64748b; letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0; transition: opacity 0.5s;
    white-space: nowrap;
    z-index: 5;
    max-width: 90%;
    overflow: hidden; text-overflow: ellipsis;
  }
  .step-label.show { opacity: 1; }

  /* ========= Step 1: Input ========= */
  .screen1 {
    position: absolute; inset: 0;
    padding: 18cqw 6cqw 6cqw;
    display: flex; flex-direction: column;
    transition: opacity 0.5s;
  }
  .screen1.hide { opacity: 0; pointer-events: none; }

  .header {
    font-size: clamp(11px, 2.6cqw, 14px);
    color: #94a3b8;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4cqw;
  }
  .prompt-label {
    font-size: clamp(22px, 6.5cqw, 36px);
    font-weight: 300;
    line-height: 1.25;
    margin-bottom: 5cqw;
  }
  .input-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4cqw;
    padding: 4.5cqw 4cqw;
    font-size: clamp(14px, 3.6cqw, 18px);
    color: #e2e8f0;
    line-height: 1.55;
  }
  .cursor { display: inline-block; width: 2px; height: 1em; background: #a5b4fc; vertical-align: text-bottom; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .ai-thinking {
    display: flex; align-items: center; gap: 12px; margin-top: 5cqw;
    color: #a5b4fc; font-size: clamp(13px, 3cqw, 16px);
    opacity: 0; transition: opacity 0.4s;
  }
  .ai-thinking.show { opacity: 1; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(165,180,252,0.2);
    border-top-color: #a5b4fc; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ========= Step 2: Match Card ========= */
  .match-card {
    position: absolute; inset: 16cqw 5cqw 5cqw;
    background: linear-gradient(145deg, #1a1b3a 0%, #2d1b4e 100%);
    border: 1px solid rgba(165,180,252,0.3);
    border-radius: 6cqw;
    padding: 6cqw 5cqw;
    display: flex; flex-direction: column;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s, transform 0.6s;
    box-shadow: 0 30px 80px rgba(165,180,252,0.2);
    overflow: hidden;
  }
  .match-card.show { opacity: 1; transform: translateY(0); }
  .match-tag {
    font-size: clamp(10px, 2.6cqw, 13px);
    color: #a5b4fc;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3cqw;
  }
  .match-head {
    display: flex; align-items: center; gap: 3cqw; margin-bottom: 4cqw;
  }
  .avatar {
    width: 14cqw; height: 14cqw; min-width: 50px; min-height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, #f472b6 0%, #a5b4fc 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(20px, 5.5cqw, 28px); font-weight: 600; color: #fff;
    border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .match-name { font-size: clamp(17px, 4.6cqw, 24px); font-weight: 500; }
  .match-meta { font-size: clamp(11px, 2.8cqw, 14px); color: #94a3b8; margin-top: 3px; }
  .match-bio {
    font-size: clamp(13px, 3.4cqw, 17px); line-height: 1.5; color: #cbd5e1;
    background: rgba(255,255,255,0.03); border-radius: 3cqw;
    padding: 4cqw; margin-bottom: 4cqw;
  }
  .similarity {
    display: flex; align-items: center; gap: 2.5cqw; font-size: clamp(11px, 2.8cqw, 14px); color: #a5b4fc;
    margin-bottom: 4cqw;
  }
  .bar {
    flex: 1; height: 5px; background: rgba(165,180,252,0.15); border-radius: 3px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #a5b4fc, #f472b6);
    border-radius: 3px;
    transition: width 1.2s ease;
  }
  .match-card.show .bar-fill { width: 94%; }
  .connect-btn {
    margin-top: auto;
    background: linear-gradient(90deg, #a5b4fc 0%, #818cf8 100%);
    color: #0a0a0f;
    font-weight: 600; font-size: clamp(14px, 3.6cqw, 18px);
    padding: 4cqw; border-radius: 3.5cqw; text-align: center;
  }

  /* ========= Step 3: Chat ========= */
  .chat {
    position: absolute; inset: 16cqw 5cqw 5cqw;
    background: #0f0f1f;
    border-radius: 5cqw;
    display: flex; flex-direction: column;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.5s, transform 0.5s;
    overflow: hidden;
  }
  .chat.show { opacity: 1; transform: translateY(0); }
  .chat-header {
    padding: 3.5cqw 4cqw;
    display: flex; align-items: center; gap: 3cqw;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .chat-header .av { width: 9cqw; height: 9cqw; min-width: 34px; min-height: 34px; font-size: clamp(13px, 3.5cqw, 18px); border-radius: 50%;
    background: linear-gradient(135deg, #f472b6 0%, #a5b4fc 100%);
    display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff;
    flex-shrink: 0;
  }
  .chat-name { font-size: clamp(14px, 3.6cqw, 18px); font-weight: 500; }
  .chat-status { font-size: clamp(10px, 2.6cqw, 13px); color: #10b981; }
  .messages {
    flex: 1; padding: 4cqw; display: flex; flex-direction: column; gap: 2cqw;
    overflow: hidden;
  }
  .bubble {
    max-width: 82%; padding: 2.8cqw 3.6cqw; border-radius: 4.5cqw;
    font-size: clamp(13px, 3.4cqw, 17px); line-height: 1.42;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .bubble.show { opacity: 1; transform: translateY(0); }
  .bubble.them {
    background: rgba(255,255,255,0.06); color: #e2e8f0;
    align-self: flex-start; border-bottom-left-radius: 4px;
  }
  .bubble.me {
    background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 100%);
    color: #0a0a0f; align-self: flex-end; border-bottom-right-radius: 4px;
    font-weight: 500;
  }
  .typing { display: flex; gap: 5px; padding: 12px 16px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #64748b;
    animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ========= End logo overlay ========= */
  .end-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(10,10,20,0.7) 0%, rgba(5,6,13,0.97) 70%);
    backdrop-filter: blur(8px);
    transition: opacity 1.2s ease;
    z-index: 50;
    padding: 0 30px;
  }
  .end-overlay.show { opacity: 1; }
  .logo-text {
    font-size: clamp(48px, 18cqw, 100px);
    font-weight: 200;
    letter-spacing: -0.03em;
    background: linear-gradient(120deg, #ffd89b 0%, #a5b4fc 50%, #c7d2fe 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline {
    font-size: clamp(11px, 3cqw, 16px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 16px;
    color: rgba(255,255,255,0.8);
    font-weight: 300;
    text-align: center;
  }

</style>
</head>
<body>
<div class="frame">
  <div class="ambient" id="ambient"></div>

  <div class="status"><span>9:41</span><span>●●●●●</span></div>
  <div class="step-label" id="stepLabel"></div>

  <!-- Screen 1: Input -->
  <div class="screen1" id="screen1">
    <div class="header">New connection</div>
    <div class="prompt-label">What&rsquo;s going on?</div>
    <div class="input-box"><span id="typed"></span><span class="cursor"></span></div>
    <div class="ai-thinking" id="thinking">
      <div class="spinner"></div>
      <div>Finding someone who gets it&hellip;</div>
    </div>
  </div>

  <!-- Screen 2: Match -->
  <div class="match-card" id="matchCard">
    <div class="match-tag">Match found</div>
    <div class="match-head">
      <div class="avatar">M</div>
      <div>
        <div class="match-name">Maya, 29</div>
        <div class="match-meta">Brooklyn · 2 months ago</div>
      </div>
    </div>
    <div class="match-bio">
      &ldquo;Lost my dad suddenly in February. Still figuring out how to exist without him. Happy to talk.&rdquo;
    </div>
    <div class="similarity">
      <span>Similarity</span>
      <div class="bar"><div class="bar-fill"></div></div>
      <span>94%</span>
    </div>
    <div class="connect-btn">Connect</div>
  </div>

  <!-- Screen 3: Chat -->
  <div class="chat" id="chat">
    <div class="chat-header">
      <div class="av">M</div>
      <div>
        <div class="chat-name">Maya</div>
        <div class="chat-status">● Online</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
  </div>

  <div class="end-overlay" id="end">
    <div class="logo-text">SameSky</div>
    <div class="tagline">Find someone who<br>actually knows</div>
  </div>
</div>


<script>
(() => {
  const amb = document.getElementById('ambient');
  for (let i = 0; i < 40; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.left = Math.random() * 100 + '%';
    d.style.top = Math.random() * 100 + '%';
    d.style.opacity = 0.1 + Math.random() * 0.3;
    amb.appendChild(d);
  }
})();

let timers = [];
const typedEl = () => document.getElementById('typed');
const typedText = "I lost my dad three weeks ago. My friends are being amazing but none of them really know what this feels like.";

function typeText(str, el, speed = 28) {
  return new Promise(resolve => {
    let i = 0;
    const tick = () => {
      if (i <= str.length) {
        el.textContent = str.slice(0, i);
        i++;
        timers.push(setTimeout(tick, speed + Math.random() * 28));
      } else resolve();
    };
    tick();
  });
}

async function play() {
  timers.forEach(clearTimeout);
  timers = [];

  // Reset
  const s1 = document.getElementById('screen1');
  s1.classList.remove('hide');
  typedEl().textContent = '';
  document.getElementById('thinking').classList.remove('show');
  document.getElementById('matchCard').classList.remove('show');
  document.getElementById('chat').classList.remove('show');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('end').classList.remove('show');
  document.getElementById('stepLabel').textContent = 'Step 1 · Tell SameSky what\u2019s going on';
  document.getElementById('stepLabel').classList.add('show');

  await new Promise(r => timers.push(setTimeout(r, 600)));
  await typeText(typedText, typedEl());
  await new Promise(r => timers.push(setTimeout(r, 700)));

  document.getElementById('thinking').classList.add('show');
  await new Promise(r => timers.push(setTimeout(r, 2200)));

  s1.classList.add('hide');
  document.getElementById('stepLabel').textContent = 'Step 2 · AI finds someone who gets it';

  await new Promise(r => timers.push(setTimeout(r, 500)));
  document.getElementById('matchCard').classList.add('show');

  await new Promise(r => timers.push(setTimeout(r, 3400)));
  document.getElementById('matchCard').classList.remove('show');

  await new Promise(r => timers.push(setTimeout(r, 500)));
  document.getElementById('chat').classList.add('show');
  document.getElementById('stepLabel').textContent = 'Step 3 · Talk to someone who knows';

  const messages = [
    { who: 'them', text: 'Hey. I saw your situation. I\u2019m so sorry.' },
    { who: 'them', text: 'Three weeks feels like forever and yesterday at once, right?' },
    { who: 'me', text: 'Yeah. Exactly that.' },
    { who: 'them', text: 'You\u2019re not alone in this. I promise.' }
  ];

  const msgContainer = document.getElementById('messages');
  await new Promise(r => timers.push(setTimeout(r, 600)));

  for (const m of messages) {
    if (m.who === 'them') {
      const t = document.createElement('div');
      t.className = 'bubble them typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      msgContainer.appendChild(t);
      t.classList.add('show');
      await new Promise(r => timers.push(setTimeout(r, 1000)));
      t.remove();
    }
    const b = document.createElement('div');
    b.className = 'bubble ' + m.who;
    b.textContent = m.text;
    msgContainer.appendChild(b);
    requestAnimationFrame(() => b.classList.add('show'));
    await new Promise(r => timers.push(setTimeout(r, m.who === 'me' ? 900 : 1100)));
  }

  await new Promise(r => timers.push(setTimeout(r, 1400)));
  document.getElementById('stepLabel').classList.remove('show');
  document.getElementById('end').classList.add('show');
}


window.addEventListener('message', e => { if (e.data === 'replay') play(); });
play();
</script>
</body>
</html>
